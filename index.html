<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMR MOTO | Yedek Parça</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000000; --card-bg: #121212; --primary: #ff0000; --text: #ffffff; --gray: #888; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding-bottom: 80px; }

        /* Header */
        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 1000; }
        .logo { font-weight: 800; font-size: 20px; text-align: center; flex-grow: 1; }
        .logo span { color: var(--primary); display: block; font-size: 10px; letter-spacing: 2px; }

        /* Search Bar */
        .search-container { padding: 10px 15px; }
        .search-bar { background: #1a1a1a; border-radius: 10px; padding: 12px; display: flex; align-items: center; color: var(--gray); }

        /* Banner Area */
        .banner { margin: 15px; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1558981806-ec527fa84c39?q=80&w=800'); 
                  height: 180px; border-radius: 20px; background-size: cover; background-position: center;
                  display: flex; flex-direction: column; justify-content: center; padding: 20px; position: relative; }
        .banner h2 { font-size: 18px; margin-bottom: 5px; }
        .banner p { font-size: 12px; color: #ccc; margin-bottom: 15px; }
        .banner button { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 8px; width: fit-content; font-weight: bold; }

        /* Categories */
        .section-title { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .section-title a { color: var(--primary); font-size: 12px; text-decoration: none; }
        .categories { display: flex; gap: 15px; overflow-x: auto; padding: 0 15px; scrollbar-width: none; }
        .cat-item { text-align: center; flex: 0 0 80px; }
        .cat-circle { width: 70px; height: 70px; background: var(--card-bg); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
        .cat-circle img { width: 50px; height: 50px; object-fit: contain; }
        .cat-item span { font-size: 11px; color: #eee; }

        /* Product Cards */
        .products { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .p-card { background: var(--card-bg); border-radius: 15px; padding: 12px; position: relative; }
        .p-badge { position: absolute; top: 10px; left: 10px; background: var(--primary); font-size: 10px; padding: 2px 8px; border-radius: 5px; }
        .p-card img { width: 100%; border-radius: 10px; margin-bottom: 10px; height: 120px; object-fit: cover; }
        .p-card h3 { font-size: 13px; margin-bottom: 4px; }
        .p-card p { font-size: 11px; color: var(--gray); margin-bottom: 8px; }
        .p-price { color: var(--primary); font-weight: bold; font-size: 14px; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; padding: 12px; }
        .nav-item { text-align: center; color: var(--gray); font-size: 10px; text-decoration: none; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 3px; }

    </style>
</head>
<body>

<header>
    <div style="font-size: 24px;">☰</div>
    <div class="logo">DMR MOTO <span>YEDEK PARÇA</span></div>
    <div style="font-size: 24px; position: relative;">🛒<span style="position:absolute; top:-5px; right:-5px; background:red; font-size:10px; padding:2px 5px; border-radius:50%;" id="cartBadge">0</span></div>
</header>

<div class="search-container">
    <div class="search-bar">🔍 Ürün, kategori veya marka ara...</div>
</div>

<div class="banner">
    <p style="color: var(--primary); font-weight: bold; font-size: 10px;">EN İYİ MARKALAR</p>
    <h2>Motosikletiniz İçin<br>En İyi Parçalar</h2>
    <p>Kaliteli ürünler, uygun fiyatlar.</p>
    <button onclick="alert('Alışverişe Başla!')">Alışverişe Başla</button>
</div>

<div class="section-title">
    <h3>Kategoriler</h3>
    <a href="#">Tümünü Gör</a>
</div>

<div class="categories">
    <div class="cat-item">
        <div class="cat-circle"><img src="https://cdn-icons-png.flaticon.com/512/2117/2117101.png"></div>
        <span>Egzoz</span>
    </div>
    <div class="cat-item">
        <div class="cat-circle"><img src="https://cdn-icons-png.flaticon.com/512/3721/3721619.png"></div>
        <span>Fren</span>
    </div>
    <div class="cat-item">
        <div class="cat-circle"><img src="https://cdn-icons-png.flaticon.com/512/1165/1165925.png"></div>
        <span>Motor</span>
    </div>
    <div class="cat-item">
        <div class="cat-circle"><img src="https://cdn-icons-png.flaticon.com/512/1048/1048453.png"></div>
        <span>Süspansiyon</span>
    </div>
</div>

<div class="section-title">
    <h3>Yeni Ürünler</h3>
    <a href="#">Tümünü Gör</a>
</div>

<div class="products" id="urunGrubu">
    <!-- Ürünler buraya gelecek -->
</div>

<nav class="bottom-nav">
    <a href="#" class="nav-item active"><span class="nav-icon">🏠</span>Ana Sayfa</a>
    <a href="#" class="nav-item"><span class="nav-icon">🔲</span>Kategoriler</a>
    <a href="#" class="nav-item"><span class="nav-icon">❤️</span>Favoriler</a>
    <a href="#" class="nav-item" onclick="siparisGonder()"><span class="nav-icon">🛒</span>Sepetim</a>
    <a href="#" class="nav-item" onclick="adminPanel()"><span class="nav-icon">👤</span>Hesabım</a>
</nav>

<script>
    const urunler = [
        { ad: "Akrapovic Egzoz", model: "Yamaha MT-09", fiyat: "18.750,00", img: "https://images.unsplash.com/photo-1611317546394-63c8308db28a?q=80&w=400" },
        { ad: "Brembo Fren Seti", model: "Ön Fren Seti", fiyat: "12.500,00", img: "https://images.unsplash.com/photo-1485965120184-e220f721d03e?q=80&w=400" },
        { ad: "K&N Hava Filtresi", model: "Performans", fiyat: "1.250,00", img: "https://images.unsplash.com/photo-1558981403-c5f91db9c08b?q=80&w=400" }
    ];

    let sepet = [];

    function urunleriYukle() {
        const grid = document.getElementById("urunGrubu");
        grid.innerHTML = "";
        urunler.forEach((u, i) => {
            grid.innerHTML += `
                <div class="p-card" onclick="sepeteEkle(${i})">
                    <span class="p-badge">Yeni</span>
                    <img src="${u.img}">
                    <h3>${u.ad}</h3>
                    <p>${u.model}</p>
                    <div class="p-price">${u.fiyat} TL</div>
                    <div style="position:absolute; bottom:12px; right:12px; color:var(--gray);">❤️</div>
                </div>
            `;
        });
    }

    function sepeteEkle(i) {
        sepet.push(urunler[i]);
        document.getElementById("cartBadge").innerText = sepet.length;
        alert(urunler[i].ad + " sepete eklendi!");
    }

    function siparisGonder() {
        if(sepet.length == 0) return alert("Sepet boş!");
        let text = "Sipariş Listesi:\n";
        sepet.forEach(u => text += `- ${u.ad} (${u.fiyat} TL)\n`);
        window.open("https://wa.me/905XXXXXXXXX?text=" + encodeURIComponent(text));
    }

    function adminPanel() {
        let pass = prompt("Yönetici Şifresi:");
        if(pass === "dmr2026") alert("Admin girişi başarılı! Buraya ürün ekleme ekranı gelecek.");
    }

    urunleriYukle();
</script>

</body>
</html>
